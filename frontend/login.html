<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZimVest — Log In</title>
<meta name="description" content="Log in to your ZimVest account to send money and manage your investments.">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="auth-page">
  <div class="hero-bg" style="background:radial-gradient(ellipse at 50% 40%, rgba(29,185,84,0.06) 0%, transparent 60%)"></div>

  <div class="auth-card">
    <a href="index.html" class="auth-logo" style="display:block">ZimVest</a>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="auth-sub">Sign in to your account</div>
      <form onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input class="form-input" id="loginEmail" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPass">Password</label>
          <input class="form-input" id="loginPass" type="password" placeholder="Enter password" required>
          <div class="form-error" id="loginError">Invalid email or password</div>
        </div>
        <button type="submit" class="form-btn" id="loginBtn">Sign In</button>
      </form>
      <div class="form-divider">or</div>
      <button class="form-btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2)" onclick="switchToSignup()">Create an Account</button>
      <div class="form-footer"><a href="index.html">Back to home</a></div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" style="display:none">
      <div class="auth-sub">Create your ZimVest account</div>
      <form onsubmit="return handleSignup(event)">
        <div class="form-group">
          <label class="form-label" for="signupName">Full Name</label>
          <input class="form-input" id="signupName" type="text" placeholder="Tinevimbo Musingadi" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signupEmail">Email</label>
          <input class="form-input" id="signupEmail" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signupPhone">Phone Number</label>
          <input class="form-input" id="signupPhone" type="tel" placeholder="+27 XX XXX XXXX" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signupPass">Password</label>
          <input class="form-input" id="signupPass" type="password" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="signupConfirm">Confirm Password</label>
          <input class="form-input" id="signupConfirm" type="password" placeholder="Repeat password" required>
          <div class="form-error" id="signupError">Passwords do not match</div>
        </div>
        <button type="submit" class="form-btn" id="signupBtn">Create Account</button>
      </form>
      <div class="form-divider">or</div>
      <button class="form-btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2)" onclick="switchToLogin()">Already have an account? Sign In</button>
      <div class="form-footer"><a href="index.html">Back to home</a></div>
    </div>
  </div>
</div>

<script>
// Check hash for signup
if (window.location.hash === '#signup') switchToSignup();

function switchToSignup() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
}

function switchToLogin() {
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');

  err.classList.remove('show');
  btn.textContent = 'Signing in...';
  btn.disabled = true;

  // Check stored users or use demo credentials
  const users = JSON.parse(localStorage.getItem('zimvest_users') || '[]');
  const found = users.find(u => u.email === email && u.password === pass);

  setTimeout(() => {
    if (found || (email === 'demo@zimvest.co.zw' && pass === 'demo123')) {
      const name = found ? found.name : 'Demo User';
      localStorage.setItem('zimvest_session', JSON.stringify({ email, name, loggedIn: true }));
      window.location.href = 'dashboard.html';
    } else {
      err.classList.add('show');
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }, 800);

  return false;
}

function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const phone = document.getElementById('signupPhone').value;
  const pass = document.getElementById('signupPass').value;
  const confirm = document.getElementById('signupConfirm').value;
  const btn = document.getElementById('signupBtn');
  const err = document.getElementById('signupError');

  err.classList.remove('show');

  if (pass !== confirm) {
    err.classList.add('show');
    return false;
  }

  btn.textContent = 'Creating account...';
  btn.disabled = true;

  // Store user in localStorage
  const users = JSON.parse(localStorage.getItem('zimvest_users') || '[]');
  users.push({ name, email, phone, password: pass, created: new Date().toISOString() });
  localStorage.setItem('zimvest_users', JSON.stringify(users));
  localStorage.setItem('zimvest_session', JSON.stringify({ email, name, loggedIn: true }));

  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 800);

  return false;
}
</script>

</body>
</html>
